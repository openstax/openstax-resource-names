name: sbom-pr-check

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm sbom --sbom-format=cyclonedx > /tmp/head-sbom.json

      - name: Generate base SBOM
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}"
          git worktree add /tmp/base "origin/${{ github.base_ref }}"
          (
            cd /tmp/base
            npm ci
            npm sbom --sbom-format=cyclonedx > /tmp/base-sbom.json
          )

      - uses: openstax/birder/.github/actions/check-pr-cves@main
        with:
          head-sbom: /tmp/head-sbom.json
          base-sbom: /tmp/base-sbom.json
